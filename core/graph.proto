// pi-shazam graph.proto
//
// Issue #628: compact columnar ProtoBuf encoding for the on-disk
// graph cache. The `serializeGraphV2` JSON format is dense and
// produces ~800KB files for a 1000-symbol project; this schema
// represents the same edge data in a struct-of-arrays layout that
// ProtoBuf's binary wire format compresses by 50-70%.
//
// The schema is intentionally narrow: only the edge maps
// (incoming / outgoing / fileCalls / fileRefs / fileTypeRefs)
// are encoded in ProtoBuf. Symbols and fileSymbols are still
// written as JSON in the same payload -- those are few and
// cheap, and proto's per-string overhead would dominate them.
//
// Issue #647: V3.1 adds a string table on the top-level payload
// that dedupes the `source` / `target` symbol IDs across every
// edge. Each unique ID is written once into `string_table`; each
// edge then references its source / target by int32 index. On a
// 1000-symbol graph with ~3 edges per node this cuts the on-disk
// size by ~20% more (from ~30% to ~50% of V2). The `EdgeColumn`
// message still carries `source` / `target` fields (kept as empty
// arrays in V3.1) so the schema remains forward-compatible with
// future wire-format revisions.
//
// Issue #647 (D, V3.2): `EdgeColumn.kind` and `FileEdgeColumn.kind`
// are encoded as int32 instead of string. Edge.kind in production
// code takes 5 distinct values (`call`, `type`, `import`, `ref`,
// `import-binding`); file-level kind takes 3 (`call`, `ref`,
// `typeRef`). Encoding as int32 (1 byte varint) replaces 5-7 byte
// strings per row; on the real pi-shazam self-scan this saves
// another ~30-50 KB on top of V3.1.
//
// Int mapping (must match `_kindToInt` / `_intToKind` in
// `core/cache.ts`):
//   0 = "call"          (most common, default for unknown)
//   1 = "type"
//   2 = "import"
//   3 = "ref"
//   4 = "typeRef"
//   5 = "import-binding"

syntax = "proto3";

package shazam.graph.v3;

// Edges connecting symbols to other symbols (incoming / outgoing).
message EdgeColumn {
  // All edges are flattened into parallel arrays. Index i across
  // each field describes the i-th edge. The length of every
  // repeated field is identical (= total edge count).
  repeated string source = 1;     // symbol id
  repeated string target = 2;     // symbol id
  repeated double weight = 3;
  repeated int32 kind = 4;        // int mapping (see file header): 0=call, 1=type, 2=import, 3=ref, 4=typeRef, 5=import-binding
  repeated double confidence = 5;
  // Provenance int mapping (matches `Provenance` in core/graph.ts):
  //   0 = resolved, 1 = name_match, 2 = heuristic, 3 = unresolved
  // Varint-encoded so the most-common case ("heuristic" = 2) costs
  // a single byte per edge.
  repeated int32 provenance = 6;
}

// Per-file edge maps: fileCalls, fileRefs, fileTypeRefs. Each entry
// is a (file, symbolId, count) triple flattened across three columns.
// The `kind` field distinguishes which map the row belongs to
// ("call" | "ref" | "typeRef"); rows from all three maps are
// concatenated into a single message per cache file.
message FileEdgeColumn {
  repeated string file = 1;        // file path
  repeated string symbol_id = 2;   // referenced symbol id
  repeated int32 count = 3;        // number of references
  repeated int32 kind = 4;        // int mapping (see file header): 0=call, 3=ref, 4=typeRef
}

// Top-level payload: the ProtoBuf-encoded view of the graph.
message GraphPayload {
  // JSON-encoded metadata blob: the symbol table, fileSymbol
  // index, fileImports, fileImportBindings, fileMtimes, and
  // timestamp. Stored as a `bytes` field so ProtoBuf length-
  // prefixes it; the contents are still JSON so the JSON parser
  // does not have to learn a new format for those small maps.
  bytes metadata = 1;
  // The four parallel edge lists.
  EdgeColumn edges = 2;
  // The concatenated file-level edge maps.
  FileEdgeColumn file_edges = 3;
  // V3.1: string table that dedupes symbol IDs across every edge.
  // `string_table[i]` is the i-th unique ID (in first-occurrence
  // order). Each edge's source / target is referenced by index
  // into this table via the parallel `edge_source_idx` /
  // `edge_target_idx` arrays below. On a 1000-symbol / ~3000-edge
  // graph this shrinks the on-disk V3 cache by ~80KB vs. inline
  // string fields.
  repeated string string_table = 4;
  // Per-edge source index into `string_table`. Length must match
  // `edge_target_idx` and equal the total edge count.
  repeated int32 edge_source_idx = 5;
  // Per-edge target index into `string_table`. Length must match
  // `edge_source_idx` and equal the total edge count.
  repeated int32 edge_target_idx = 6;
}
